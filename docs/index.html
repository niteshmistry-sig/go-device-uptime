<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>GO Device Uptime Dashboard</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&family=Roboto+Mono:wght@400&display=swap">
  <style>
    /* ═══════════════════════════════════════════════════════════
       Geotab Zenith Design System — @geotab/zenith v3.5.0 tokens
       Scoped under #gudContainer to avoid MyGeotab conflicts
       ═══════════════════════════════════════════════════════════ */

    /* — Zenith Design Tokens — */
    :root {
      --text-primary: #1F2833;
      --text-secondary: #4E677E;
      --text-placeholder: #8DA4B9;
      --text-hyperlink: #005AA8;
      --text-error-message: #C51A11;
      --text-button-disabled: #C0CCD8;
      --text-reverse-primary: #FFFFFF;

      --backgrounds-main: #FFFFFF;
      --backgrounds-content-0: #F9FAFB;
      --backgrounds-content-1: #F2F5F7;
      --backgrounds-content-2: #D9E1E8;
      --backgrounds-hover: #E6EBEF;
      --backgrounds-field-disabled: #E6EBEF;
      --backgrounds-primary-brand: #25477B;
      --backgrounds-reverse-1: #1F2833;

      --borders-general: #C0CCD8;
      --borders-secondary: #748FAA;
      --borders-form-field--hover: #748FAA;
      --borders-form-field--active: #0078D3;

      --action-primary--default: #0078D3;
      --action-primary--hover: #005AA8;
      --action-primary--active: #004080;
      --action-secondary--default: #4E677E;
      --action-tertiary--hover: #E6EBEF;

      --accents-error--main: #FFECEB;
      --accents-error--detail: #A01F0E;
      --accents-success--main: #EDFEF2;
      --accents-success--detail: #2B6436;
      --accents-warning--main: #FFF8E6;
      --accents-warning--detail: #8C6D1F;
      --accents-general--main: #EBF6FF;
      --accents-general--detail: #25477B;

      --main-font: Roboto, "Segoe UI", "Helvetica Neue", sans-serif;
      --main-font-data: "Roboto Mono", "Segoe UI Mono", monospace;
    }

    /* — Reset scoped to container — */
    #gudContainer *, #gudContainer *::before, #gudContainer *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    #gudContainer {
      font-family: var(--main-font);
      font-size: 14px;
      line-height: 20px;
      color: var(--text-primary);
      background: var(--backgrounds-content-0);
      min-height: 100vh;
    }

    /* ── Page Header (Brand Bar) ── */
    #gudContainer .gud-page-header {
      background: var(--backgrounds-primary-brand);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #gudContainer .gud-page-header h1 {
      font-size: 20px;
      font-weight: 400;
      color: var(--text-reverse-primary);
      margin: 0;
      line-height: 24px;
    }
    #gudContainer .gud-page-header p {
      font-size: 13px;
      font-weight: 300;
      color: var(--text-reverse-primary);
      opacity: 0.85;
      margin: 2px 0 0 0;
    }
    #gudContainer .gud-header-icon {
      width: 24px;
      height: 24px;
      fill: var(--text-reverse-primary);
      margin-right: 12px;
      flex-shrink: 0;
    }
    #gudContainer .gud-header-left {
      display: flex;
      align-items: center;
    }

    /* ── Tab Bar ── */
    #gudContainer .gud-tab-bar {
      background: var(--backgrounds-main);
      border-bottom: 1px solid var(--borders-general);
      padding: 0 32px;
      display: flex;
      gap: 0;
    }
    #gudContainer .gud-tab-btn {
      padding: 14px 24px;
      font-family: var(--main-font);
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      border: none;
      background: none;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
    }
    #gudContainer .gud-tab-btn:hover {
      color: var(--action-primary--default);
    }
    #gudContainer .gud-tab-btn.active {
      color: var(--action-primary--default);
      border-bottom-color: var(--action-primary--default);
    }

    /* ── Content Area ── */
    #gudContainer .gud-content {
      max-width: 1440px;
      margin: 0 auto;
      padding: 24px 32px 32px;
    }
    #gudContainer .gud-tab-content {
      display: none;
    }
    #gudContainer .gud-tab-content.active {
      display: block;
    }

    /* ── Controls Toolbar ── */
    #gudContainer .gud-toolbar {
      display: flex;
      align-items: flex-end;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    #gudContainer .gud-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    #gudContainer .gud-field label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.32px;
    }
    #gudContainer .gud-field select,
    #gudContainer .gud-field input[type="datetime-local"],
    #gudContainer .gud-field input[type="number"] {
      font-family: var(--main-font);
      font-size: 14px;
      line-height: 20px;
      color: var(--text-primary);
      padding: 9px 12px;
      border: 1px solid var(--borders-general);
      border-radius: 4px;
      background: var(--backgrounds-main);
      min-height: 40px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    #gudContainer .gud-field select:hover,
    #gudContainer .gud-field input:hover {
      border-color: var(--borders-form-field--hover);
    }
    #gudContainer .gud-field select:focus,
    #gudContainer .gud-field input:focus {
      outline: none;
      border-color: var(--borders-form-field--active);
      box-shadow: 0 0 0 3px rgba(0,120,211,0.15);
    }
    #gudContainer .gud-field select {
      min-width: 220px;
    }

    /* ── Buttons ── */
    #gudContainer .gud-btn {
      font-family: var(--main-font);
      font-size: 14px;
      font-weight: 500;
      line-height: 20px;
      padding: 10px 28px;
      min-height: 40px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s;
    }
    #gudContainer .gud-btn--primary {
      background: var(--action-primary--default);
      color: var(--text-reverse-primary);
      box-shadow: 0 1px 2px rgba(0,120,211,0.2);
    }
    #gudContainer .gud-btn--primary:hover {
      background: var(--action-primary--hover);
      box-shadow: 0 2px 4px rgba(0,120,211,0.3);
    }
    #gudContainer .gud-btn--primary:active {
      background: var(--action-primary--active);
    }
    #gudContainer .gud-btn--primary:disabled {
      background: var(--backgrounds-field-disabled);
      color: var(--text-button-disabled);
      cursor: not-allowed;
      box-shadow: none;
    }
    #gudContainer .gud-btn--secondary {
      background: var(--backgrounds-main);
      color: var(--action-secondary--default);
      border: 1px solid var(--borders-general);
    }
    #gudContainer .gud-btn--secondary:hover {
      background: var(--action-tertiary--hover);
      border-color: var(--borders-secondary);
    }

    /* ── KPI Summary Cards ── */
    #gudContainer .gud-kpi-row {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    #gudContainer .gud-kpi-card {
      flex: 1;
      min-width: 180px;
      background: var(--backgrounds-main);
      border: 1px solid var(--borders-general);
      border-radius: 8px;
      padding: 20px 24px;
      box-shadow: 0 1px 3px rgba(31,40,51,0.06), 0 1px 2px rgba(31,40,51,0.04);
    }
    #gudContainer .gud-kpi-card__label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.32px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    #gudContainer .gud-kpi-card__value {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.1;
    }
    #gudContainer .gud-kpi-card--success .gud-kpi-card__value { color: var(--accents-success--detail); }
    #gudContainer .gud-kpi-card--warning .gud-kpi-card__value { color: var(--accents-warning--detail); }
    #gudContainer .gud-kpi-card--error .gud-kpi-card__value { color: var(--accents-error--detail); }

    /* ── Panel / Card ── */
    #gudContainer .gud-panel {
      background: var(--backgrounds-main);
      border: 1px solid var(--borders-general);
      border-radius: 8px;
      box-shadow: 0 1px 3px rgba(31,40,51,0.06), 0 1px 2px rgba(31,40,51,0.04);
      overflow: hidden;
      margin-bottom: 24px;
    }
    #gudContainer .gud-panel__header {
      background: var(--backgrounds-content-1);
      border-bottom: 1px solid var(--borders-general);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #gudContainer .gud-panel__title {
      font-size: 16px;
      font-weight: 500;
      color: var(--text-primary);
      line-height: 24px;
    }

    /* ── Tables ── */
    #gudContainer .gud-table-wrap {
      overflow-x: auto;
    }
    #gudContainer .gud-table {
      width: 100%;
      border-collapse: collapse;
    }
    #gudContainer .gud-table thead th {
      background: var(--backgrounds-content-1);
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.32px;
      color: var(--text-secondary);
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid var(--borders-general);
      position: sticky;
      top: 0;
      z-index: 1;
      white-space: nowrap;
    }
    #gudContainer .gud-table tbody td {
      padding: 10px 16px;
      border-bottom: 1px solid var(--backgrounds-content-1);
      font-family: var(--main-font-data);
      font-size: 13px;
      line-height: 18px;
      color: var(--text-primary);
    }
    #gudContainer .gud-table tbody tr:last-child td {
      border-bottom: none;
    }
    #gudContainer .gud-table tbody tr:nth-child(even) {
      background: var(--backgrounds-content-0);
    }
    #gudContainer .gud-table tbody tr:hover {
      background: var(--accents-general--main);
    }

    /* ── Status Row Colors ── */
    #gudContainer .gud-table tbody tr.gud-row--success {
      background: var(--accents-success--main);
    }
    #gudContainer .gud-table tbody tr.gud-row--success:hover {
      background: #d6f5df;
    }
    #gudContainer .gud-table tbody tr.gud-row--warning {
      background: var(--accents-warning--main);
    }
    #gudContainer .gud-table tbody tr.gud-row--warning:hover {
      background: #fff0cc;
    }
    #gudContainer .gud-table tbody tr.gud-row--error {
      background: var(--accents-error--main);
    }
    #gudContainer .gud-table tbody tr.gud-row--error:hover {
      background: #ffd9d6;
    }

    /* ── Status Dot ── */
    #gudContainer .gud-status-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 8px;
      vertical-align: middle;
    }
    #gudContainer .gud-status-dot--success { background: var(--accents-success--detail); }
    #gudContainer .gud-status-dot--warning { background: var(--accents-warning--detail); }
    #gudContainer .gud-status-dot--error { background: var(--accents-error--detail); }

    /* ── Pill / Badge ── */
    #gudContainer .gud-pill {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-family: var(--main-font);
      font-size: 12px;
      font-weight: 500;
      line-height: 16px;
      white-space: nowrap;
    }
    #gudContainer .gud-pill--error {
      background: var(--accents-error--main);
      color: var(--accents-error--detail);
    }
    #gudContainer .gud-pill--warning {
      background: var(--accents-warning--main);
      color: var(--accents-warning--detail);
    }
    #gudContainer .gud-pill--success {
      background: var(--accents-success--main);
      color: var(--accents-success--detail);
    }
    #gudContainer .gud-pill--info {
      background: var(--accents-general--main);
      color: var(--accents-general--detail);
    }
    #gudContainer .gud-pill--neutral {
      background: var(--backgrounds-content-1);
      color: var(--text-secondary);
    }

    /* ── Loading State ── */
    #gudContainer .gud-loading {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-secondary);
      font-size: 14px;
    }
    #gudContainer .gud-spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 3px solid var(--borders-general);
      border-top-color: var(--action-primary--default);
      border-radius: 50%;
      animation: gudSpin 0.8s linear infinite;
      margin-right: 10px;
      vertical-align: middle;
    }
    @keyframes gudSpin { to { transform: rotate(360deg); } }

    /* ── Status Banner (log output) ── */
    #gudContainer .gud-status-log {
      margin-top: 24px;
      padding: 14px 20px;
      background: var(--backgrounds-reverse-1);
      color: #8ec07c;
      font-family: var(--main-font-data);
      font-size: 12px;
      line-height: 18px;
      border-radius: 8px;
      white-space: pre-wrap;
      min-height: 40px;
      max-height: 180px;
      overflow-y: auto;
    }

    /* ── Empty State ── */
    #gudContainer .gud-empty {
      text-align: center;
      padding: 32px;
      color: var(--text-secondary);
      font-size: 14px;
    }

    /* ── Responsive ── */
    @media (max-width: 800px) {
      #gudContainer .gud-content { padding: 16px; }
      #gudContainer .gud-page-header { padding: 16px; }
      #gudContainer .gud-tab-bar { padding: 0 16px; }
      #gudContainer .gud-kpi-row { flex-direction: column; }
      #gudContainer .gud-toolbar { flex-direction: column; align-items: stretch; }
      #gudContainer .gud-field select { min-width: auto; width: 100%; }
    }
  </style>
</head>
<body>

<div id="gudContainer">

  <!-- Page Header -->
  <div class="gud-page-header">
    <div class="gud-header-left">
      <svg class="gud-header-icon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/>
      </svg>
      <div>
        <h1>GO Device Uptime Dashboard</h1>
        <p>Monitor device communication health and diagnose interruptions</p>
      </div>
    </div>
  </div>

  <!-- Tab Bar -->
  <div class="gud-tab-bar">
    <button class="gud-tab-btn active" onclick="switchTab('realtime')">Real-Time Status</button>
    <button class="gud-tab-btn" onclick="switchTab('historical')">Historical Gap Analysis</button>
  </div>

  <!-- Content -->
  <div class="gud-content">

    <!-- ═══ TAB 1: Real-Time Status ═══ -->
    <div class="gud-tab-content active" id="tab-realtime">

      <!-- Toolbar -->
      <div class="gud-toolbar">
        <div class="gud-field">
          <label>Filter by Group</label>
          <select id="groupFilter" onchange="filterDevices()">
            <option value="">All Groups</option>
          </select>
        </div>
        <button class="gud-btn gud-btn--secondary" id="btnRefresh" onclick="loadRealtimeStatus()">&#x21bb; Refresh</button>
      </div>

      <!-- KPI Cards -->
      <div class="gud-kpi-row" id="realtimeSummary" style="display:none;">
        <div class="gud-kpi-card">
          <div class="gud-kpi-card__label">Total Devices</div>
          <div class="gud-kpi-card__value" id="totalDevices">-</div>
        </div>
        <div class="gud-kpi-card gud-kpi-card--success">
          <div class="gud-kpi-card__label">Communicating</div>
          <div class="gud-kpi-card__value" id="commDevices">-</div>
        </div>
        <div class="gud-kpi-card gud-kpi-card--warning">
          <div class="gud-kpi-card__label">Stale (&gt; 1h)</div>
          <div class="gud-kpi-card__value" id="staleDevices">-</div>
        </div>
        <div class="gud-kpi-card gud-kpi-card--error">
          <div class="gud-kpi-card__label">Not Communicating (&gt; 24h)</div>
          <div class="gud-kpi-card__value" id="offlineDevices">-</div>
        </div>
      </div>

      <!-- Device Table -->
      <div id="realtimeTable"></div>
    </div>

    <!-- ═══ TAB 2: Historical Gap Analysis ═══ -->
    <div class="gud-tab-content" id="tab-historical">

      <!-- Toolbar -->
      <div class="gud-toolbar">
        <div class="gud-field">
          <label>Device</label>
          <select id="gapDevice">
            <option value="">-- Select Device --</option>
          </select>
        </div>
        <div class="gud-field">
          <label>From Date</label>
          <input type="datetime-local" id="gapFrom">
        </div>
        <div class="gud-field">
          <label>To Date</label>
          <input type="datetime-local" id="gapTo">
        </div>
        <div class="gud-field">
          <label>Gap Threshold (min)</label>
          <input type="number" id="gapThreshold" value="30" min="5" max="1440" style="width:90px;">
        </div>
        <button class="gud-btn gud-btn--primary" id="btnAnalyze" onclick="analyzeGaps()">Analyze Gaps</button>
      </div>

      <!-- KPI Cards -->
      <div class="gud-kpi-row" id="gapSummary" style="display:none;">
        <div class="gud-kpi-card">
          <div class="gud-kpi-card__label">Uptime</div>
          <div class="gud-kpi-card__value" id="uptimePct">-</div>
        </div>
        <div class="gud-kpi-card">
          <div class="gud-kpi-card__label">Interruptions</div>
          <div class="gud-kpi-card__value" id="gapCount">-</div>
        </div>
        <div class="gud-kpi-card">
          <div class="gud-kpi-card__label">Longest Gap</div>
          <div class="gud-kpi-card__value" id="longestGap">-</div>
        </div>
        <div class="gud-kpi-card">
          <div class="gud-kpi-card__label">Most Common Cause</div>
          <div class="gud-kpi-card__value" id="commonCause" style="font-size:16px;">-</div>
        </div>
      </div>

      <!-- Gaps Table -->
      <div id="gapsTable"></div>
    </div>

  </div>

  <!-- Status Log -->
  <div class="gud-content" style="padding-top:0;">
    <div class="gud-status-log" id="output"></div>
  </div>

</div>

<script>
// ============================================================
//  STATE
// ============================================================
var api = null;
var allDevices = [];
var allStatusInfo = [];
var allGroups = [];
var mergedDevices = [];

// ============================================================
//  MyGeotab Add-In Lifecycle
// ============================================================
geotab.addin.goDeviceUptime = function () {
  return {
    initialize: function (freshApi, state, callback) {
      api = freshApi;
      setDefaults();
      callback();
    },
    focus: function (freshApi, state) {
      api = freshApi;
      loadRealtimeStatus();
    },
    blur: function () {}
  };
};

// ============================================================
//  API WRAPPERS
// ============================================================
function apiGet(typeName, search) {
  return new Promise(function (resolve, reject) {
    api.call("Get", { typeName: typeName, search: search || {} }, resolve, reject);
  });
}

function apiMultiCall(calls) {
  return new Promise(function (resolve, reject) {
    api.multiCall(calls, resolve, reject);
  });
}

// ============================================================
//  HELPERS
// ============================================================
function val(id) { return document.getElementById(id).value.trim(); }
function log(msg) {
  var el = document.getElementById("output");
  el.textContent += msg + "\n";
  el.scrollTop = el.scrollHeight;
}
function clearLog() { document.getElementById("output").textContent = ""; }

function escHtml(s) {
  if (s == null) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function formatDuration(ms) {
  if (ms < 0) ms = 0;
  var totalMin = Math.floor(ms / 60000);
  var d = Math.floor(totalMin / 1440);
  var h = Math.floor((totalMin % 1440) / 60);
  var m = totalMin % 60;
  var parts = [];
  if (d > 0) parts.push(d + "d");
  if (h > 0) parts.push(h + "h");
  parts.push(m + "m");
  return parts.join(" ");
}

function formatDateTime(iso) {
  if (!iso) return "-";
  return new Date(iso).toLocaleString();
}

function timeSince(iso) {
  if (!iso) return "-";
  return formatDuration(Date.now() - new Date(iso).getTime());
}

// ============================================================
//  TAB SWITCHING
// ============================================================
function switchTab(name) {
  document.querySelectorAll(".gud-tab-btn").forEach(function (b, i) {
    b.classList.toggle("active", (name === "realtime" && i === 0) || (name === "historical" && i === 1));
  });
  document.getElementById("tab-realtime").classList.toggle("active", name === "realtime");
  document.getElementById("tab-historical").classList.toggle("active", name === "historical");
}

// ============================================================
//  TAB 1: REAL-TIME STATUS
// ============================================================
function loadRealtimeStatus() {
  clearLog();
  log("Loading devices and status info...");
  document.getElementById("realtimeTable").innerHTML = '<div class="gud-loading"><span class="gud-spinner"></span> Loading device status...</div>';

  apiMultiCall([
    ["Get", { typeName: "Device", search: {} }],
    ["Get", { typeName: "DeviceStatusInfo", search: {} }],
    ["Get", { typeName: "Group", search: {} }]
  ]).then(function (results) {
    allDevices = results[0] || [];
    allStatusInfo = results[1] || [];
    allGroups = results[2] || [];

    log("Loaded " + allDevices.length + " devices, " + allStatusInfo.length + " status records, " + allGroups.length + " groups.");

    buildGroupFilter();
    populateDeviceSelector();
    mergeAndRender();
  }).catch(function (err) {
    log("ERROR: " + (err.message || err));
    document.getElementById("realtimeTable").innerHTML = "";
  });
}

function buildGroupFilter() {
  var sel = document.getElementById("groupFilter");
  sel.innerHTML = '<option value="">All Groups</option>';
  var groupMap = {};
  allGroups.forEach(function (g) {
    if (g.name && g.id !== "GroupCompanyId") groupMap[g.id] = g.name;
  });
  var usedGroups = {};
  allDevices.forEach(function (d) {
    if (d.groups) d.groups.forEach(function (g) {
      if (groupMap[g.id]) usedGroups[g.id] = groupMap[g.id];
    });
  });
  Object.keys(usedGroups).sort(function (a, b) { return usedGroups[a].localeCompare(usedGroups[b]); }).forEach(function (id) {
    var opt = document.createElement("option");
    opt.value = id;
    opt.textContent = usedGroups[id];
    sel.appendChild(opt);
  });
}

function populateDeviceSelector() {
  var sel = document.getElementById("gapDevice");
  sel.innerHTML = '<option value="">-- Select Device --</option>';
  allDevices.slice().sort(function (a, b) { return (a.name || "").localeCompare(b.name || ""); }).forEach(function (d) {
    var opt = document.createElement("option");
    opt.value = d.id;
    opt.textContent = d.name + (d.serialNumber ? " (" + d.serialNumber + ")" : "");
    sel.appendChild(opt);
  });
}

function mergeAndRender() {
  var statusMap = {};
  allStatusInfo.forEach(function (si) {
    if (si.device) statusMap[si.device.id] = si;
  });

  mergedDevices = allDevices.map(function (d) {
    var si = statusMap[d.id] || {};
    var lastComm = si.dateTime || null;
    var msSince = lastComm ? (Date.now() - new Date(lastComm).getTime()) : Infinity;
    var status, statusClass;
    if (si.isDeviceCommunicating) {
      if (msSince > 3600000) { status = "Stale"; statusClass = "warning"; }
      else { status = "Communicating"; statusClass = "success"; }
    } else {
      if (msSince > 86400000) { status = "Not Communicating"; statusClass = "error"; }
      else if (msSince > 3600000) { status = "Stale"; statusClass = "warning"; }
      else { status = "Communicating"; statusClass = "success"; }
    }
    return {
      id: d.id, name: d.name || "(unnamed)", serialNumber: d.serialNumber || "-",
      groups: d.groups || [], status: status, statusClass: statusClass,
      lastComm: lastComm, msSince: msSince, lat: si.latitude, lng: si.longitude
    };
  });

  filterDevices();
}

function filterDevices() {
  var gf = val("groupFilter");
  var filtered = mergedDevices;
  if (gf) {
    filtered = mergedDevices.filter(function (d) {
      return d.groups.some(function (g) { return g.id === gf; });
    });
  }

  var order = { error: 0, warning: 1, success: 2 };
  filtered.sort(function (a, b) {
    var oa = order[a.statusClass] != null ? order[a.statusClass] : 9;
    var ob = order[b.statusClass] != null ? order[b.statusClass] : 9;
    if (oa !== ob) return oa - ob;
    return a.name.localeCompare(b.name);
  });

  var total = filtered.length;
  var green = filtered.filter(function (d) { return d.statusClass === "success"; }).length;
  var yellow = filtered.filter(function (d) { return d.statusClass === "warning"; }).length;
  var red = filtered.filter(function (d) { return d.statusClass === "error"; }).length;

  document.getElementById("realtimeSummary").style.display = "flex";
  document.getElementById("totalDevices").textContent = total;
  document.getElementById("commDevices").textContent = green;
  document.getElementById("staleDevices").textContent = yellow;
  document.getElementById("offlineDevices").textContent = red;

  var html = '<div class="gud-panel"><div class="gud-panel__header"><span class="gud-panel__title">All Devices (' + total + ')</span></div>' +
    '<div class="gud-table-wrap"><table class="gud-table"><thead><tr>' +
    '<th>Device Name</th><th>Serial Number</th><th>Status</th>' +
    '<th>Last Data Received</th><th>Time Since Last Comm</th><th>Location</th>' +
    '</tr></thead><tbody>';

  if (filtered.length === 0) {
    html += '<tr><td colspan="6" class="gud-empty">No devices found</td></tr>';
  } else {
    filtered.forEach(function (d) {
      var loc = (d.lat != null && d.lng != null && d.lat !== 0 && d.lng !== 0)
        ? d.lat.toFixed(4) + ", " + d.lng.toFixed(4) : "-";
      html += '<tr class="gud-row--' + d.statusClass + '">' +
        '<td style="font-family:var(--main-font);font-weight:500;">' + escHtml(d.name) + '</td>' +
        '<td>' + escHtml(d.serialNumber) + '</td>' +
        '<td style="font-family:var(--main-font);"><span class="gud-status-dot gud-status-dot--' + d.statusClass + '"></span>' + d.status + '</td>' +
        '<td>' + formatDateTime(d.lastComm) + '</td>' +
        '<td>' + timeSince(d.lastComm) + '</td>' +
        '<td>' + loc + '</td></tr>';
    });
  }
  html += '</tbody></table></div></div>';
  document.getElementById("realtimeTable").innerHTML = html;
}

// ============================================================
//  TAB 2: HISTORICAL GAP ANALYSIS
// ============================================================
function analyzeGaps() {
  var deviceId = val("gapDevice");
  var fromDate = val("gapFrom");
  var toDate = val("gapTo");
  var threshold = parseInt(val("gapThreshold"), 10) || 30;

  if (!deviceId) { log("Select a device."); return; }
  if (!fromDate || !toDate) { log("Select a date range."); return; }

  clearLog();
  var fromISO = new Date(fromDate).toISOString();
  var toISO = new Date(toDate).toISOString();
  var thresholdMs = threshold * 60 * 1000;

  log("Fetching LogRecords for device " + deviceId + "...");
  document.getElementById("gapsTable").innerHTML = '<div class="gud-loading"><span class="gud-spinner"></span> Analyzing communication gaps...</div>';
  document.getElementById("gapSummary").style.display = "none";

  apiGet("LogRecord", {
    deviceSearch: { id: deviceId }, fromDate: fromISO, toDate: toISO
  }).then(function (records) {
    records = records || [];
    log("Received " + records.length + " LogRecords.");

    if (records.length < 2) {
      log("Not enough records to detect gaps.");
      document.getElementById("gapsTable").innerHTML = '<div class="gud-empty">Not enough LogRecords in this date range. Try a wider range or different device.</div>';
      return;
    }

    records.sort(function (a, b) { return new Date(a.dateTime) - new Date(b.dateTime); });

    var gaps = [];
    for (var i = 1; i < records.length; i++) {
      var t1 = new Date(records[i - 1].dateTime).getTime();
      var t2 = new Date(records[i].dateTime).getTime();
      var delta = t2 - t1;
      if (delta > thresholdMs) {
        gaps.push({ start: records[i - 1].dateTime, end: records[i].dateTime, durationMs: delta, cause: null });
      }
    }

    log("Detected " + gaps.length + " gap(s) exceeding " + threshold + " min threshold.");

    if (gaps.length === 0) { renderGapResults(gaps, fromISO, toISO); return; }

    return analyzeCauses(deviceId, gaps).then(function (analyzedGaps) {
      renderGapResults(analyzedGaps, fromISO, toISO);
    });
  }).catch(function (err) {
    log("ERROR: " + (err.message || err));
    document.getElementById("gapsTable").innerHTML = "";
  });
}

function analyzeCauses(deviceId, gaps) {
  log("Analyzing probable causes for " + gaps.length + " gap(s)...");

  var promises = gaps.map(function (gap, idx) {
    var windowStart = new Date(new Date(gap.start).getTime() - 3600000).toISOString();
    var windowEnd = new Date(new Date(gap.end).getTime() + 3600000).toISOString();

    return apiMultiCall([
      ["Get", { typeName: "FaultData", search: { deviceSearch: { id: deviceId }, diagnosticSearch: { id: "DiagnosticDeviceHasBeenUnpluggedId" }, fromDate: windowStart, toDate: windowEnd }}],
      ["Get", { typeName: "FaultData", search: { deviceSearch: { id: deviceId }, diagnosticSearch: { id: "DiagnosticDeviceRestartedBecauseOfLowVoltageInPowerSupplyId" }, fromDate: windowStart, toDate: windowEnd }}],
      ["Get", { typeName: "StatusData", search: { deviceSearch: { id: deviceId }, diagnosticSearch: { id: "DiagnosticGoDeviceVoltageId" }, fromDate: windowStart, toDate: windowEnd }}],
      ["Get", { typeName: "StatusData", search: { deviceSearch: { id: deviceId }, diagnosticSearch: { id: "DiagnosticIgnitionId" }, fromDate: windowStart, toDate: windowEnd }}],
      ["Get", { typeName: "StatusData", search: { deviceSearch: { id: deviceId }, diagnosticSearch: { id: "DiagnosticCellularRssiId" }, fromDate: windowStart, toDate: windowEnd }}]
    ]).then(function (results) {
      gap.cause = determineCause(gap, results[0]||[], results[1]||[], results[2]||[], results[3]||[], results[4]||[]);
      log("  Gap " + (idx + 1) + ": " + gap.cause);
      return gap;
    }).catch(function () {
      gap.cause = "Unknown - Analysis Error";
      return gap;
    });
  });

  return Promise.all(promises);
}

function determineCause(gap, unplugged, lowVoltageRestart, voltageData, ignitionData, rssiData) {
  if (unplugged.length > 0) return "Device Unplugged";
  if (lowVoltageRestart.length > 0) return "Low Voltage Restart";

  var gapStartTime = new Date(gap.start).getTime();
  var preGapVoltage = voltageData.filter(function (v) {
    var t = new Date(v.dateTime).getTime();
    return t <= gapStartTime && t >= gapStartTime - 3600000;
  });
  if (preGapVoltage.length > 0) {
    var volts = preGapVoltage[preGapVoltage.length - 1].data;
    if (volts > 100) volts = volts / 1000;
    if (volts < 6) return "Low Battery / Power Loss";
  }

  var gapEndTime = new Date(gap.end).getTime();
  var gapIgnition = ignitionData.filter(function (v) {
    var t = new Date(v.dateTime).getTime();
    return t >= gapStartTime - 3600000 && t <= gapEndTime + 3600000;
  });
  if (gapIgnition.length > 0) {
    if (gapIgnition.every(function (v) { return v.data === 0; })) return "Ignition Off (Low-Power Mode)";
  }

  var preGapRssi = rssiData.filter(function (v) {
    var t = new Date(v.dateTime).getTime();
    return t <= gapStartTime && t >= gapStartTime - 3600000;
  });
  if (preGapRssi.length > 0) {
    if (preGapRssi[preGapRssi.length - 1].data < -100) return "Weak Cellular Signal";
  }

  return "Unknown - Possible Network Issue";
}

function renderGapResults(gaps, fromISO, toISO) {
  var periodMs = new Date(toISO).getTime() - new Date(fromISO).getTime();
  var totalGapMs = gaps.reduce(function (sum, g) { return sum + g.durationMs; }, 0);
  var uptimePct = periodMs > 0 ? (((periodMs - totalGapMs) / periodMs) * 100).toFixed(1) : "100.0";
  var longest = gaps.reduce(function (max, g) { return g.durationMs > max ? g.durationMs : max; }, 0);

  var causeCounts = {};
  gaps.forEach(function (g) { var c = g.cause || "Unknown"; causeCounts[c] = (causeCounts[c] || 0) + 1; });
  var commonCause = "-", maxCount = 0;
  Object.keys(causeCounts).forEach(function (c) { if (causeCounts[c] > maxCount) { maxCount = causeCounts[c]; commonCause = c; } });

  document.getElementById("gapSummary").style.display = "flex";
  document.getElementById("uptimePct").textContent = uptimePct + "%";
  document.getElementById("gapCount").textContent = gaps.length;
  document.getElementById("longestGap").textContent = longest > 0 ? formatDuration(longest) : "-";
  document.getElementById("commonCause").textContent = gaps.length > 0 ? commonCause : "-";

  var html = '<div class="gud-panel"><div class="gud-panel__header"><span class="gud-panel__title">Communication Gaps (' + gaps.length + ')</span></div>' +
    '<div class="gud-table-wrap"><table class="gud-table"><thead><tr>' +
    '<th>#</th><th>Gap Start</th><th>Gap End</th><th>Duration</th><th>Probable Cause</th>' +
    '</tr></thead><tbody>';

  if (gaps.length === 0) {
    html += '<tr><td colspan="5" class="gud-empty" style="color:var(--accents-success--detail);">No communication gaps detected — device had continuous uptime during this period.</td></tr>';
  } else {
    gaps.forEach(function (g, i) {
      html += '<tr><td>' + (i + 1) + '</td>' +
        '<td>' + formatDateTime(g.start) + '</td>' +
        '<td>' + formatDateTime(g.end) + '</td>' +
        '<td>' + formatDuration(g.durationMs) + '</td>' +
        '<td><span class="gud-pill ' + getPillClass(g.cause) + '">' + escHtml(g.cause) + '</span></td></tr>';
    });
  }
  html += '</tbody></table></div></div>';
  document.getElementById("gapsTable").innerHTML = html;
}

function getPillClass(cause) {
  if (!cause) return "gud-pill--neutral";
  if (cause.indexOf("Unplugged") >= 0) return "gud-pill--error";
  if (cause.indexOf("Low Voltage Restart") >= 0) return "gud-pill--error";
  if (cause.indexOf("Low Battery") >= 0) return "gud-pill--warning";
  if (cause.indexOf("Ignition") >= 0) return "gud-pill--success";
  if (cause.indexOf("Cellular") >= 0) return "gud-pill--info";
  return "gud-pill--neutral";
}

// ============================================================
//  DEFAULT DATE RANGE (last 7 days)
// ============================================================
function setDefaults() {
  var now = new Date();
  var week = new Date(now.getTime() - 7 * 86400000);
  function fmt(d) {
    return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" +
      String(d.getDate()).padStart(2, "0") + "T" + String(d.getHours()).padStart(2, "0") + ":" +
      String(d.getMinutes()).padStart(2, "0");
  }
  document.getElementById("gapFrom").value = fmt(week);
  document.getElementById("gapTo").value = fmt(now);
}
</script>
